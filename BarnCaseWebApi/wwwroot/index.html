<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>BarnCaseWeb | Final Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --altin: #d4af37;
            --koyu: #0a0a0a;
            --kart: #161616;
        }

        body {
            background: var(--koyu);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }

        .ust-nav {
            border-bottom: 1px solid #222;
            background: #000;
            padding: 15px 0;
        }

        .profil-kutusu {
            position: relative;
            cursor: pointer;
            padding: 5px 15px;
            border: 1px solid #333;
            border-radius: 8px;
            background: #111;
        }

        .profil-detay {
            position: absolute;
            right: 0;
            top: 110%;
            background: #1a1a1a;
            border: 1px solid var(--altin);
            padding: 15px;
            width: 220px;
            display: none;
            z-index: 1000;
            border-radius: 8px;
        }

        .profil-kutusu:hover .profil-detay {
            display: block;
        }

        .altin-bar {
            height: 24px;
            background: #222;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            margin-top: 10px;
            border: 1px solid #333;
        }

        .bar-metin {
            position: absolute;
            width: 100%;
            text-align: center;
            color: #fff !important;
            font-size: 11px;
            font-weight: bold;
            line-height: 24px;
            z-index: 5;
            text-shadow: 1px 1px 2px #000;
        }

        .bar-doluluk {
            height: 100%;
            background: linear-gradient(90deg, #d4af37, #f1d592);
            transition: 0.5s linear;
        }

        .altin-btn {
            background: var(--altin);
            color: #000;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            width: 100%;
            padding: 8px;
            transition: 0.2s;
        }

        .animal-card {
            background: var(--kart);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px;
        }

        .hidden {
            display: none !important;
        }

        .pazar-scroll {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 0;
            scrollbar-width: none;
        }

        .hayvan-kutu {
            background: #111;
            border: 1px solid #222;
            min-width: 100px;
            padding: 10px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="ust-nav mb-4">
        <div class="container d-flex justify-content-between align-items-center">
            <h2 style="color: var(--altin); font-weight: bold; margin:0;">BarnCaseWeb</h2>
            <div id="u_ust" class="hidden d-flex align-items-center gap-4">
                <div class="text-end">
                    <small class="text-muted altin-btn" style="font-size:10px">CÜZDAN</small>
                    <div id="l_para" style="font-size: 1.3rem; font-weight: bold; color: var(--altin);">0.00 $</div>
                </div>

                <div class="profil-kutusu">
                    <span id="u_isim">Profil</span>
                    <div class="profil-detay shadow">
                        <input type="text" id="i_yeni_isim" class="form-control form-control-sm bg-dark text-white mb-2" placeholder="Yeni İsim">
                        <button onclick="fn_profil_update()" class="altin-btn btn-sm mb-2">PROFİLİ GÜNCELLE</button>
                        <button onclick="location.reload()" class="btn btn-outline-danger btn-sm w-100">ÇIKIŞ</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="u_giris" class="container mt-5 text-center">
        <div class="animal-card mx-auto" style="max-width: 350px;">
            <h4 class="mb-4">Çiftlik Girişi</h4>
            <input type="text" id="inp_u" class="form-control mb-2 bg-dark text-white border-secondary" placeholder="Kullanıcı">
            <input type="password" id="inp_p" class="form-control mb-3 bg-dark text-white border-secondary" placeholder="Şifre">
            <button onclick="fn_auth('login')" class="altin-btn mb-2">GİRİŞ</button>
            <button onclick="fn_auth('register')" class="altin-btn btn-link text-muted btn-sm">Kayıt Ol</button>
        </div>
    </div>

    <div id="u_oyun" class="hidden container">
        <div class="animal-card mb-4">
            <h6 class="text-muted altin-btn mb-2">HAYVAN PAZARI</h6>
            <div class="pazar-scroll" id="m_list"></div>
        </div>
        <div class="row" id="ahir_grid"></div>
    </div>

    <script>
        const API = "https://localhost:7283/api";
        let token = "";

        const items = [
            { id: 'inek', n: 'İnek', p: 50, e: '🐄' }, { id: 'tavuk', n: 'Tavuk', p: 20, e: '🐔' },
            { id: 'koyun', n: 'Koyun', p: 40, e: '🐑' }, { id: 'keçi', n: 'Keçi', p: 35, e: '🐐' },
            { id: 'ördek', n: 'Ördek', p: 25, e: '🦆' }, { id: 'geyik', n: 'Geyik', p: 75, e: '🦌' },
            { id: 'at', n: 'At', p: 150, e: '🐎' }, { id: 'arı', n: 'Arı', p: 80, e: '🐝' },
            { id: 'boğa', n: 'Boğa', p: 120, e: '🐂' }, { id: 'tavşan', n: 'Tavşan', p: 30, e: '🐇' }
        ];

        document.getElementById('m_list').innerHTML = items.map(i => `
            <div class="hayvan-kutu" onclick="fn_buy('${i.id}')">
                <div style="font-size:1.6rem">${i.e}</div>
                <div class="small fw-bold">${i.n}</div>
                <div style="color:var(--altin); font-size:11px;">${i.p}$</div>
            </div>
        `).join('');

        async function fn_auth(m) {
            const res = await fetch(`${API}/auth/${m}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: inp_u.value, password: inp_p.value })
            });
            if (res.ok) {
                if (m === 'register') alert("Kayıt Başarılı!");
                else {
                    const d = await res.json(); token = d.token;
                    document.getElementById('u_giris').classList.add('hidden');
                    document.getElementById('u_oyun').classList.remove('hidden');
                    document.getElementById('u_ust').classList.remove('hidden');
                    fn_upd();
                    setInterval(fn_upd, 2000);
                }
            } else alert("Hata oluştu!");
        }

        async function fn_upd() {
            const res = await fetch(`${API}/barn/status`, { headers: { 'Authorization': `Bearer ${token}` } });
            if (res.ok) {
                const d = await res.json();
                document.getElementById('l_para').innerText = (d.balance || 0).toFixed(2) + " $";
                document.getElementById('u_isim').innerText = d.username;

                const simdi = new Date();
                document.getElementById('ahir_grid').innerHTML = d.animals.map(a => {
                    const dogum = new Date(a.birthDate);
                    const gecenSaniye = Math.floor((simdi - dogum) / 1000);
                    const toplamOmur = a.lifespanInSeconds || 60;
                    let yuzde = Math.round(((toplamOmur - gecenSaniye) / toplamOmur) * 100);

                    if (isNaN(yuzde)) yuzde = 0;

                    if (yuzde <= 0) {
                        fn_op('sell-animal', a.id, 'DELETE');
                        return '';
                    }

                    return `
                    <div class="col-md-4 mb-3">
                        <div class="animal-card">
                            <div class="d-flex justify-content-between">
                                <b>${a.type.toUpperCase()}</b>
                                <span class="badge bg-dark border border-secondary">${a.productCount} Ürün</span>
                            </div>
                            <div class="altin-bar">
                                <div class="bar-metin">SAĞLIK: %${yuzde}</div>
                                <div class="bar-doluluk" style="width: ${yuzde}%"></div>
                            </div>
                            <div class="d-flex gap-2 mt-3">
                                <button onclick="fn_op('sell-product', ${a.id}, 'POST')" class="altin-btn btn-sm">ÜRÜN SAT</button>
                                <button onclick="fn_op('sell-animal', ${a.id}, 'DELETE')" class="btn btn-outline-danger btn-sm">HAYVANI SAT</button>
                            </div>
                        </div>
                    </div>`;
                }).join('');
            }
        }

        async function fn_buy(t) {
            await fetch(`${API}/barn/buy/${t}`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } });
            fn_upd();
        }

        async function fn_op(path, id, method) {
            const res = await fetch(`${API}/barn/${path}/${id}`, {
                method: method,
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) fn_upd();
        }

        async function fn_profil_update() {
            const yeni = document.getElementById('i_yeni_isim').value;
            if (!yeni) return alert("İsim boş olamaz!");

            const res = await fetch(`${API}/barn/update-profile`, {
                method: 'PUT',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json' 
                },
                body: JSON.stringify(yeni) 
            });

            if (res.ok) {
                alert("İsim güncellendi!");
                document.getElementById('i_yeni_isim').value = "";
                fn_upd(); 
            } else {
                
                const hata = await res.text();
                console.error("Sunucu Hatası:", hata);
                alert("Hata: " + res.status);
            }
        }
    </script>
</body>
</html>
